# v19 - Clean rewrite with Flutter 3.32.0
name: Build Custom APK
on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Flavor to build'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - sos_security
          - highway_devils
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout guardian-sos-signup repo
        uses: actions/checkout@v4
        with:
          repository: c42die4/guardian-sos-signup
          token: ${{ secrets.GH_TOKEN }}
          path: signup-repo

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          path: app-repo

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        working-directory: app-repo
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          cat android/local.properties

      - name: Fix Gradle wrapper version
        working-directory: app-repo
        run: |
          sed -i 's/gradle-[0-9.]*-all/gradle-8.11.1-all/g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Get Flutter dependencies
        working-directory: app-repo
        run: flutter pub get

      - name: Decode keystore
        working-directory: app-repo
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/guardian-sos-release.jks

      - name: Create key.properties
        working-directory: app-repo
        run: |
          printf 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=../guardian-sos-release.jks\n' > android/key.properties

      - name: Build release APK
        working-directory: app-repo
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          echo "Building flavor: $FLAVOR"
          flutter build apk --release --flavor "$FLAVOR"

      - name: Copy APK to signup repo and push
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          mkdir -p signup-repo/downloads
          cp app-repo/build/app/outputs/flutter-apk/app-${FLAVOR}-release.apk signup-repo/downloads/${FLAVOR}.apk
          ls -lh signup-repo/downloads/
          cd signup-repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add downloads/${FLAVOR}.apk
          git commit -m "Update APK for ${FLAVOR}" || echo "No changes to commit"
          git push
          echo "Done: https://c42die4.github.io/guardian-sos-signup/downloads/${FLAVOR}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.flavor }}-release
          path: app-repo/build/app/outputs/flutter-apk/app-${{ github.event.inputs.flavor }}-release.apk
          retention-days: 30

      - name: Summary
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "Flavor: ${FLAVOR}" >> $GITHUB_STEP_SUMMARY
          echo "Download: https://c42die4.github.io/guardian-sos-signup/downloads/${FLAVOR}.apk" >> $GITHUB_STEP_SUMMARY
