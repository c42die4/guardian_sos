# Build workflow v11 - let flutter handle everything
name: Build Custom APK

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Flavor to build'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - sos_security

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          echo "Created local.properties:"
          cat android/local.properties

      - name: Create Gradle wrapper properties
        run: |
          mkdir -p android/gradle/wrapper
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.11.1-all.zip\n' > android/gradle/wrapper/gradle-wrapper.properties
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.11.0/gradle/wrapper/gradle-wrapper.jar" 2>/dev/null \
            || wget -q -O android/gradle/wrapper/gradle-wrapper.jar \
            "https://services.gradle.org/distributions/gradle-8.11.1-bin.zip" || true
          ls -la android/gradle/wrapper/

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/guardian-sos-release.jks

      - name: Create key.properties
        run: |
          printf 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=../guardian-sos-release.jks\n' > android/key.properties

      - name: Build release APK
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          echo "Building flavor: $FLAVOR"
          flutter build apk --release --flavor "$FLAVOR"

      - name: Rename and save APK
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-${FLAVOR}-release.apk output/${FLAVOR}.apk
          ls -lh output/

      - name: Upload APK to guardian-sos-signup repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          APK_PATH="output/${FLAVOR}.apk"
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/c42die4/guardian-sos-signup/contents/downloads/${FLAVOR}.apk" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          CONTENT=$(base64 -w 0 "$APK_PATH")
          if [ -z "$SHA" ]; then
            PAYLOAD="{\"message\":\"Add APK for ${FLAVOR}\",\"content\":\"${CONTENT}\"}"
          else
            PAYLOAD="{\"message\":\"Update APK for ${FLAVOR}\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\"}"
          fi
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/c42die4/guardian-sos-signup/contents/downloads/${FLAVOR}.apk"
          echo "✅ Done: https://c42die4.github.io/guardian-sos-signup/downloads/${FLAVOR}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.flavor }}-release
          path: output/${{ github.event.inputs.flavor }}.apk
          retention-days: 30

      - name: Summary
        run: |
          FLAVOR="${{ github.event.inputs.flavor }}"
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Flavor:** ${FLAVOR}" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** https://c42die4.github.io/guardian-sos-signup/downloads/${FLAVOR}.apk" >> $GITHUB_STEP_SUMMARY
